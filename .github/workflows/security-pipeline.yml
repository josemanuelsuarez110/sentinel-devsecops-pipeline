name: Secure DevOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  sast:
    name: Static Analysis (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependency Audit (NPM Audit)
        run: npm audit --audit-level=high

  build:
    name: Build & Prepare
    needs: sast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Application Image
        run: |
          docker build -t node-app-test:latest .
          docker save node-app-test:latest > node-app-test.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: node-app-test.tar

  dast:
    name: Dynamic Analysis (DAST)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load < node-app-test.tar

      - name: Run Container (Ephemeral)
        run: |
          docker run -d --name zap-target -p 3000:3000 node-app-test:latest
          # Wait for app to be ready
          sleep 5

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:3000/'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a' # Include alpha rules
          fail_action: false # Action will not fail automatically, we will check manually
          allow_issue_writing: false

      - name: Check for High or Critical Vulnerabilities
        run: |
          if [ -f report_full_scan.html ]; then
            if grep -qP "(?i)<td[^>]*>(High|Critical)</td>" report_full_scan.html; then
              echo "High or Critical vulnerabilities detected in ZAP scan! Failing pipeline."
              exit 1
            else
              echo "No High or Critical vulnerabilities found."
            fi
          fi

      - name: Stop Container
        if: always()
        run: docker stop zap-target && docker rm zap-target

      - name: Generate PDF Report (Custom PDF Generation)
        if: always()
        run: |
          # The ZAP action generates HTML by default. 
          # We can use a tool like 'wkhtmltopdf' or similar if needed, 
          # but ZAP action usually provides the report in artifacts.
          # Here we'll ensure the report is collected and labeled.
          mkdir -p reports
          if [ -f report_full_scan.html ]; then
            cp report_full_scan.html reports/
          fi
          # Placeholder for PDF conversion logic if high-end PDF is strictly required
          echo "PDF Report placeholder" > reports/zap-report.pdf 

      - name: Upload DAST Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-zap-report
          path: |
            report_full_scan.html
            reports/

  deploy_staging:
    name: Deploy to Hardened Staging
    needs: dast
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        # This is a placeholder for actual deployment logic (e.g., SSH, K8s, etc.)
        # In a real scenario, this would involve pushing the image to a registry
        # and updating the staging environment.
        run: |
          echo "Deploying to Hardened Staging..."
          echo "Configuring Self-Managed SSL certificates (Certbot/Nginx Gateway)..."
          # Example: ssh user@staging.server "docker-compose up -d"
          # We provide the Dockerfile.staging which is already hardened.
